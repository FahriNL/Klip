                    className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-xl text-xs font-bold text-rose-500 active:scale-95 flex items-center justify-center gap-1.5 col-span-2">
                    <Trash2 size={13}/> Hapus Yang Selesai ({totalDone})
                  </button>
                </div>
              </div>

              {/* PRO: Export */}
              <div className={`p-4 rounded-2xl border relative overflow-hidden ${
                isProMode
                  ? 'bg-amber-50 dark:bg-amber-900/10 border-amber-200 dark:border-amber-500/20'
                  : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 opacity-70'
              }`}>
                <div className="absolute top-0 right-0 p-3 opacity-10"><Crown size={48}/></div>
                <p className="text-xs font-bold uppercase tracking-widest mb-1 flex items-center gap-1.5" style={{color: isProMode ? '#d97706' : undefined}}>
                  <Crown size={11}/> Ekspor Daftar Tugas
                </p>
                <p className="text-[0.625rem] text-slate-500 dark:text-slate-400 mb-3 leading-relaxed">
                  {isProMode ? 'Salin semua tugas sebagai teks terformat siap kirim.' : 'Upgrade ke Pro untuk ekspor tugas ke teks terformat.'}
                </p>
                <button
                  onMouseDown={e=>e.stopPropagation()}
                  onClick={e=>{ e.stopPropagation(); exportTasks(); }}
                  className={`w-full py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2 active:scale-95 ${
                    isProMode ? 'bg-amber-500 text-white shadow-md shadow-amber-200 dark:shadow-amber-900/30' : 'bg-slate-200 dark:bg-slate-700 text-slate-400 cursor-not-allowed'
                  }`}>
                  <Copy size={13}/>
                  {isProMode ? 'Salin Daftar Tugas' : <><Crown size={11} className="text-amber-500"/> Khusus Pro</>}
                </button>
              </div>

            </div>
          );
        }

        return null;
      };


      /* ════════════════════════════════════
         SMART DRAWER
      ═════════════════════════════════════ */
      const tabLabels={ekstrak:'Ekstrak',brankas:'Brankas',draft:'Draf',hitung:'Hitung',sandi:'Sandi',warna:'Warna',bersih:'Bersih',masak:'Memasak',tugas:'Tugas'};

      const renderSmartDrawer = () => (
        <div
          ref={drawerRef}
          id="smart-drawer"
          className="absolute bottom-0 left-0 right-0 bg-white dark:bg-slate-900 rounded-t-[2.5rem] shadow-[0_-16px_40px_rgba(0,0,0,0.10)] z-50 flex flex-col overflow-hidden border-t border-slate-100 dark:border-slate-800"
          style={{height:COLLAPSED_H+'px',touchAction:'none'}}
        >
          {/* Handle zone */}
          <div
            className="w-full flex flex-col items-center pt-3 flex-shrink-0 cursor-grab active:cursor-grabbing"
            onMouseDown={e=>onDragStart(e.clientY)}
            onMouseMove={e=>{ if(e.buttons===1) onDragMove(e.clientY); }}
            onMouseUp={()=>onDragEnd()}
            onTouchStart={e=>{onDragStart(e.touches[0].clientY);}}
            onTouchMove={e=>{onDragMove(e.touches[0].clientY);}}
            onTouchEnd={e=>{onDragEnd();}}
            onClick={()=>{ if(Math.abs(drag.current.lastDy)<8) snapDrawer(!drawerOpen); }}
          >
            <div className={`w-10 h-1.5 rounded-full mb-3 transition-colors ${drawerOpen?'bg-slate-400':'bg-slate-300'}`}/>

            {!drawerOpen&&(
              <div className="w-full flex items-center justify-between px-5 pb-2">
                <div className="flex items-center gap-2 overflow-x-auto hide-scrollbar flex-1">
                  {activeTab==='brankas'&&(
                    <div className="flex gap-1.5">
                      {[['all','Semua'],['bank','Bank'],['id','ID'],['address','Alamat'],['link','Link'],['color','Warna'],['recipe','Resep']].map(([f,l])=>(
                        <button key={f} onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setVaultFilter(f);}} className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border active:scale-95 ${vaultFilter===f?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{l}</button>
                      ))}
                    </div>
                  )}
                  {activeTab==='draft'&&<div className="text-xs font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full flex items-center gap-1.5"><FileText size={12}/> {wc} kata · {draftText.length} kar</div>}
                  {activeTab==='hitung'&&(
                    <div className="flex gap-1.5">
                      <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setTaxPct('11');setSvcPct('0');}} className="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95">PB1 11%</button>
                      <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setTaxPct('11');setSvcPct('5');}} className="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95">+Servis 5%</button>
                    </div>
                  )}
                  {activeTab==='sandi'&&(
                    <div className="flex gap-1.5">
                      {[['ABC',useUpper,setUseUpper],['123',useNums,setUseNums],['#@!',useSyms,setUseSyms]].map(([l,v,s])=>(
                        <button key={l} onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();s(p=>!p);}} className={`px-3 py-1.5 rounded-full text-xs font-bold border active:scale-95 ${v?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{l}</button>
                      ))}
                    </div>
                  )}
                  {activeTab==='ekstrak'&&<div className={`text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 ${th.light} ${th.text}`}><Wand2 size={12}/> {tr('Pengaturan Ekstrak', 'Extract Settings')}</div>}
                  {activeTab==='warna'&&<button onClick={()=>snapDrawer(true)} className="px-5 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95 flex items-center gap-1.5"><Settings2 size={12}/> {tr('Pengaturan Warna', 'Color Settings')}</button>}
                  {activeTab==='masak'&&<button onClick={()=>snapDrawer(true)} className="px-5 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95 flex items-center gap-1.5"><Settings2 size={12}/> Pengaturan Memasak</button>}
                  {activeTab==='tugas'&&(() => {
                    const act = tugasItems.filter(t=>!t.isDone).length;
                    const ov  = tugasItems.filter(t=>!t.isDone && t.deadline < now.getTime()).length;
                    return (
                      <button onClick={()=>snapDrawer(true)} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold active:scale-95 flex-shrink-0">
                        <ListPlus size={12}/>
                        <span>{act} aktif</span>
                        {ov > 0 && <span className="bg-rose-500 text-white text-[0.5rem] font-black px-1.5 py-0.5 rounded-full leading-none">{ov} lewat</span>}
                      </button>
                    );
                  })()}
                </div>
                <div className="flex-shrink-0 ml-3 h-7 w-7 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 cursor-pointer hover:bg-slate-200"><ChevronUp size={15}/></div>
              </div>
            )}
            {drawerOpen&&(
              <div className="w-full flex items-center justify-between px-5 pb-2">
                <span className="text-sm font-black text-slate-900 dark:text-white tracking-wide">Pengaturan {tabLabels[activeTab]}</span>
                <div className="h-7 w-7 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400" style={{transform:'rotate(180deg)'}}><ChevronUp size={15}/></div>
              </div>
            )}
          </div>

          {/* Content */}
          <div className="flex-1 overflow-y-auto px-5 pb-10 hide-scrollbar">
            {renderDrawerContent()}
          </div>
        </div>
      );

      /* ════════════════════════════════════
         WARNA UTILITY
      ═════════════════════════════════════ */
      const renderWarna = () => {
        const renderC = () => {
          const fmtHex = (c) => hexUpper ? c.toUpperCase() : c;
          
          if(!parsedColor) return <div className="text-center py-12 bg-slate-50 dark:bg-slate-800 border border-dashed border-slate-200 dark:border-slate-700 rounded-2xl"><Palette size={20} className="mx-auto mb-2 text-slate-300"/><p className="text-slate-400 text-sm">{tr('Masukkan format warna yang valid', 'Enter a valid color format')}</p></div>;
          return (
            <div className="space-y-4 fade-in">
              <div className="h-32 w-full rounded-2xl shadow-inner border border-slate-100 dark:border-slate-700 transition-colors" style={{backgroundColor: parsedColor.hex}}></div>
              <div className="space-y-2">
                {[['HEX', fmtHex(parsedColor.hex)], ['RGB', `rgb(${parsedColor.rgb.r}, ${parsedColor.rgb.g}, ${parsedColor.rgb.b})`], ['HSL', `hsl(${parsedColor.hsl.h}, ${parsedColor.hsl.s}%, ${parsedColor.hsl.l}%)`]].map(([l, v]) => (
                  <div key={l} className="flex justify-between items-center bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3 rounded-xl">
                    <span className="font-bold text-[0.625rem] text-slate-400 uppercase tracking-widest w-10">{l}</span>
                    <span className="font-mono text-sm font-semibold text-slate-700 dark:text-slate-300 flex-1 pl-3">{v}</span>
                    <button onClick={()=>copy(v, l)} className="h-8 w-8 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-800 rounded-lg flex items-center justify-center text-slate-500 active:scale-90"><Copy size={13}/></button>
                  </div>
                ))}
              </div>
            </div>
          );
        };
        const renderP = () => {
          const fmtHex = (c) => hexUpper ? c.toUpperCase() : c;
          if(!parsedColor || !paletteW) return <div className="text-center py-12 text-slate-400 text-sm">{tr('Warna tidak valid', 'Invalid color')}</div>;
          const Chip = ({c}) => <button onClick={()=>copy(fmtHex(c), 'Hex')} className="h-10 w-full rounded-lg shadow-sm active:scale-95 transition-all outline outline-1 outline-slate-200/50" style={{backgroundColor: c}}></button>;
          const handleKirimVault = () => {
            if(!isProMode) { toast(tr('Khusus Pro!', 'Pro Only!')); return; }
            const noteData = `Base: ${fmtHex(parsedColor.hex)}\n{tr('Analogus', 'Analogous')}: ${paletteW.analogus.map(fmtHex).join(', ')}\n{tr('Triadik', 'Triadic')}: ${paletteW.triadik.map(fmtHex).join(', ')}\nKomplementer: ${paletteW.komplementer.map(fmtHex).join(', ')}`;
            saveToVault(noteData, 'color');
          };
          return (
            <div className="space-y-5 fade-in pb-12">
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest flex justify-between"><span>{tr('Warna Dasar', 'Base Color')}</span><span className="font-mono">{fmtHex(parsedColor.hex)}</span></p><Chip c={parsedColor.hex}/></div>
              {isProMode && <button onClick={handleKirimVault} className="w-full bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 border border-emerald-100 dark:border-emerald-500/30"><Crown size={14}/> {tr('Simpan ke Brankas', 'Save to Vault')}</button>}
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">{tr('Analogus', 'Analogous')}</p><div className="flex gap-2">{paletteW.analogus.map((c,i)=><div key={'a'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">{tr('Triadik', 'Triadic')}</p><div className="flex gap-2">{paletteW.triadik.map((c,i)=><div key={'t'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">{tr('Tints (Menuju Putih)', 'Tints (Towards White)')}</p><div className="flex gap-1">{paletteW.tints.map((c,i)=><div key={'ti'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">{tr('Shades (Menuju Hitam)', 'Shades (Towards Black)')}</p><div className="flex gap-1">{paletteW.shades.map((c,i)=><div key={'sh'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
            </div>
          );
        };
        const renderG = () => {
          const colors = gUse3 && isProMode ? `${gColor1}, ${gColor3}, ${gColor2}` : `${gColor1}, ${gColor2}`;
          const cssGrad = `linear-gradient(${gAngle}, ${colors})`;
          return (
            <div className="space-y-4 fade-in pb-12">
              <div className="h-40 w-full rounded-2xl shadow-inner border border-slate-200 dark:border-slate-700" style={{background: cssGrad}}></div>
              <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 font-mono text-xs font-semibold text-slate-600 dark:text-slate-400 leading-relaxed overflow-x-auto">{`background: ${cssGrad};`}</div>
              <button onClick={()=>copy(`background: ${cssGrad};`, 'CSS')} className={`w-full py-3 ${th.bg} text-white font-bold rounded-xl active:scale-95`}>{tr('Salin CSS Gradien', 'Copy CSS Gradient')}</button>
              <div className="mt-4 p-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl space-y-4">
                <div className="flex items-center justify-between"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{tr('Warna 1', 'Color 1')}</span><div className="w-10 h-10 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700"><input type="color" value={gColor1} onChange={e=>setGColor1(e.target.value)} className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] cursor-pointer"/></div></div>
                <div className="flex items-center justify-between"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{tr('Warna 2', 'Color 2')}</span><div className="w-10 h-10 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700"><input type="color" value={gColor2} onChange={e=>setGColor2(e.target.value)} className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] cursor-pointer"/></div></div>
                <div className={`flex items-center justify-between transition-opacity ${!isProMode?'opacity-50 grayscale':''}`}>
                  <div className="flex items-center gap-1.5"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{tr('Warna Tengah', 'Middle Color')}</span>{!isProMode&&<Crown size={11} className="text-amber-500"/>}</div>
                  <div className="flex items-center gap-3">
                    <div className={`w-14 h-8 rounded-full relative flex-shrink-0 transition-colors ${!isProMode?'cursor-default':'cursor-pointer'} ${gUse3 && isProMode ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={()=>{if(isProMode) setGUse3(!gUse3);}}>
                      <div className={`w-6 h-6 rounded-full absolute top-[4px] bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${gUse3 && isProMode ?'translate-x-7':'translate-x-1'}`}/>
                    </div>
                    <div className={`w-10 h-10 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 ${!gUse3||!isProMode?'opacity-30 pointer-events-none':''}`}><input type="color" value={gColor3} onChange={e=>setGColor3(e.target.value)} disabled={!gUse3||!isProMode} className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] cursor-pointer"/></div>
                  </div>
                </div>
                <div className="flex flex-col gap-3 pt-3 border-t border-slate-100 dark:border-slate-800">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{tr('Arah Gradien', 'Gradient Direction')}</span>
                  <div className="flex gap-2">
                    {['to right', 'to bottom right', 'to bottom', 'to left'].map(a=><button key={a} onClick={()=>setGAngle(a)} className={`flex-1 py-1.5 flex justify-center items-center rounded-lg border transition-all ${gAngle===a?th.bg+' border-transparent text-white shadow-md':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 active:scale-95'}`}>{a==='to right'?<ArrowRight size={18}/>:a==='to bottom right'?<ArrowDownRight size={18}/>:a==='to bottom'?<ArrowDown size={18}/>:<ArrowLeft size={18}/>}</button>)}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        return (
          <div className="fade-in space-y-4 pt-2 pb-48">
            <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab6')}.</h2>
            <p className="text-sm font-semibold text-slate-500 dark:text-slate-400 leading-relaxed mb-6">{t('wDesc')}</p>
            <div className="flex bg-slate-200/50 dark:bg-slate-800 p-1 rounded-xl gap-1 mb-5 border border-slate-200/50 dark:border-slate-700">
              {[ ['konversi', t('wKonversi')], ['palet', t('wPalet')], ['gradien', t('wGradien')] ].map(([v, l]) => (
                <button key={v} onClick={()=>setWarnaMode(v)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${warnaMode===v?'bg-white dark:bg-slate-900 shadow-sm text-slate-800 dark:text-slate-200 ring-1 ring-slate-100 dark:ring-slate-700/50':'text-slate-500 dark:text-slate-400'}`}>{l}</button>
              ))}
            </div>
            {warnaMode !== 'gradien' && (
              <div className="relative mb-5">
                <input type="text" value={warnaInput} onChange={e=>setWarnaInput(e.target.value)} placeholder={t('wCari')} className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-2xl p-4 pl-12 text-sm font-mono font-bold text-slate-800 dark:text-slate-200 focus:outline-none placeholder-slate-400/70`}/>
                <Palette size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"/>
              </div>
            )}
            {warnaMode === 'konversi' && renderC()}
            {warnaMode === 'palet'    && renderP()}
            {warnaMode === 'gradien'  && renderG()}
          </div>
        );
      };

      /* ════════════════════════════════════
         MASAK UTILITY
      ═════════════════════════════════════ */
      const renderMasak = () => {



        const renderTimers = () => {
            if(cookTimers.length === 0) return null;
            return (
                <div className="space-y-2 mb-6">
                    <p className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest">{tr('Timers Aktif', 'Active Timers')}</p>
                    {cookTimers.map(t => <CookTimerItem key={t.id} t={t} setCookTimers={setCookTimers} />)}
                </div>
            );
        };

        const requestWakeLock = async () => {
            try { if ('wakeLock' in navigator) { const lock = await navigator.wakeLock.request('screen'); setWakeLock(lock); toast(tr('Layar senantiasa menyala', 'Screen stays awake')); } } catch (err) {}
        };
        const releaseWakeLock = async () => {
            if (wakeLock) { await wakeLock.release(); setWakeLock(null); toast(tr('Penahan layar dilepas', 'Screen lock released')); }
        };

        if(cookActiveView === 'step') {
            const r = cookRecipes.find(x => x.id === cookSelectedId);
            if(!r) return null;
            const step = r.steps[cookStepIdx];
            const isLast = cookStepIdx === r.steps.length - 1;
            return (
                <div className="fixed inset-0 z-50 bg-[#FAFAFA] dark:bg-slate-950 flex flex-col sm:max-w-md sm:mx-auto pt-[env(safe-area-inset-top,2.5rem)] pb-[env(safe-area-inset-bottom,1.5rem)] px-6 slide-up overflow-hidden">
                   <div className="flex justify-between items-center mb-8">
                      <div className="flex items-center gap-2">
                         <button onClick={() => {setCookActiveView('detail'); releaseWakeLock();}} className="h-10 w-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><ArrowLeft size={18}/></button>
                         <h2 className="text-lg font-black text-slate-900 dark:text-white line-clamp-1">{r.title}</h2>
                      </div>
                      <button onClick={wakeLock ? releaseWakeLock : requestWakeLock} className={`h-10 px-4 rounded-full font-bold text-xs flex items-center gap-1.5 transition-colors ${wakeLock ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>
                         <Flame size={14}/> {wakeLock ? 'Layar Nyala' : 'Layar Normal'}
                      </button>
                   </div>
                   
                   <div className="flex-1 flex flex-col justify-start pt-10 overflow-y-auto hide-scrollbar pb-10">
                      <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Langkah {cookStepIdx + 1} dari {r.steps.length}</p>
                      <h3 className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-tight mb-10">
                         {step.text}
                      </h3>
                      
                      {step.timerMs > 0 && (
                          <div className="p-5 bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-500/20 rounded-2xl mb-8 flex flex-col xs:flex-row items-center justify-between gap-4">
                             <div className="flex-1 w-full">
                                <p className="font-bold text-amber-700 dark:text-amber-500 text-sm flex items-center gap-1.5"><Timer size={16}/> Mulai Timer {Math.round(step.timerMs/60000)}m</p>
                             </div>
                             <button onClick={() => {
                                 setCookTimers(p => [...p, {id: Date.now().toString(), title: `L.${cookStepIdx+1}: ${r.title}`, durationMs: step.timerMs, endMs: Date.now() + step.timerMs, active: true}]);
                                 toast(tr('Timer dimulai!', 'Timer started!')); playClick('success');
                             }} className="h-14 w-14 bg-amber-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90">
                                <Play fill="currentColor" size={24} className="ml-1"/>
                             </button>
                          </div>
                      )}

                      {renderTimers()}
                   </div>
                   
                   <div className="flex gap-4 mt-auto pt-4 pb-[calc(env(safe-area-inset-bottom,0px)+1.5rem)] px-4 border-t border-slate-200 dark:border-slate-800 bg-[#FAFAFA] dark:bg-slate-950 relative z-[60] shrink-0">
                      <button disabled={cookStepIdx === 0} onClick={() => setCookStepIdx(i => Math.max(0, i - 1))} className="h-16 w-16 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-2xl flex items-center justify-center disabled:opacity-30 active:scale-[0.98]">
                         <ArrowLeft size={24}/>
                      </button>
                      <button onClick={() => {
                          if(isLast) { setCookActiveView('detail'); releaseWakeLock(); playClick('success'); toast(tr('Selesai Memasak! 🎉', 'Cooking Done! 🎉')); }
                          else setCookStepIdx(i => i + 1);
                      }} className={`h-16 flex-1 ${th.bg} text-white font-black text-lg rounded-2xl flex items-center justify-center active:scale-[0.98] shadow-xl`}>
                         {isLast ? 'Selesai!' : 'Berikutnya'} <ArrowRight size={20} className="ml-2"/>
                      </button>
                   </div>
                </div>
            );
        }

        if(cookActiveView === 'form') {
           return (
              <CookForm 
                onSave={(r) => { 
                   setCookRecipes(p => { const ex = p.findIndex(x => x.id === r.id); if(ex >= 0) { const n = [...p]; n[ex] = r; return n; } return [r, ...p]; });
                   setCookActiveView('list'); toast(tr('Resep disimpan!', 'Recipe saved!')); playClick('success');
                }}
                onCancel={() => setCookActiveView('list')} 
                existingData={cookSelectedId ? cookRecipes.find(x=>x.id===cookSelectedId) : null}
                th={th}
                toast={toast}
                tr={tr}
              />
           );
        }

        if(cookActiveView === 'detail') {
           const r = cookRecipes.find(x => x.id === cookSelectedId);
           if(!r) return null;
           const sRatio = cookPortion / r.defaultPortions;
           return (
              <div className="fade-in space-y-6 pt-2 pb-48">
                 <div className="flex justify-between items-start">
                    <button onClick={() => setCookActiveView('list')} className="h-10 w-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><ArrowLeft size={18}/></button>
                    <div className="flex gap-2">
                       <button onClick={() => {
                          const recipeText = `*Resep: ${r.title}*\n${r.desc}\n\n*Bahan (${cookPortion} porsi):*\n${r.ingredients.map(i => '- ' + (i.amount * sRatio).toPrecision(4).replace(/\.0+$/,'').replace(/(\.\d*?[1-9])0+$/,'$1') + ' ' + i.unit + ' ' + i.name).join('\n')}\n\n*Langkah:*\n${r.steps.map((s,i) => (i+1)+'. '+s.text).join('\n')}`;
                          saveToVault(recipeText, 'recipe');
                       }} className="h-10 px-4 bg-slate-100 dark:bg-slate-800 border-opacity-50 border border-slate-200 dark:border-slate-700 rounded-full flex items-center justify-center gap-1.5 text-slate-700 dark:text-slate-300 active:scale-90 transition-all font-bold text-[0.6875rem]" title={tr('Simpan ke Brankas', 'Save to Vault')}>
                          <CreditCard size={14}/>
                          <span>{tr('Simpan', 'Save')}</span>
                          <Crown size={11} className="text-amber-500 ml-0.5"/>
                       </button>
                       <button onClick={() => setCookActiveView('form')} className="h-10 w-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><Settings2 size={16}/></button>
                       <button onClick={() => { setCookRecipes(p => p.filter(x => x.id !== r.id)); setCookActiveView('list'); toast(tr('Resep dihapus', 'Recipe deleted')); }} className="h-10 w-10 bg-rose-50 dark:bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center active:scale-90"><Trash2 size={16}/></button>
                    </div>
                 </div>
                 
                 <div>
                    {r.photo && <img src={r.photo} alt={r.title} className="w-full h-48 object-cover rounded-3xl mb-4 shadow-sm" />}
                    <div className="flex flex-wrap gap-1.5 mb-2">
                        {r.tags.map(t => <span key={t} className={`px-2 py-0.5 rounded text-[0.625rem] font-bold uppercase tracking-wider ${th.light} ${th.text}`}>{t}</span>)}
                    </div>
                    <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2 leading-tight">{r.title}</h2>
                    <p className="text-sm font-medium text-slate-500 dark:text-slate-400 hidden-scroll">{r.desc}</p>
                 </div>

                 {renderTimers()}

                 <button onClick={() => { setCookStepIdx(0); setCookActiveView('step'); if(cookSettings.autoWakelock) requestWakeLock(); }} className={`w-full py-5 rounded-[1.25rem] flex items-center justify-center gap-2 font-black text-white ${th.bg} shadow-lg active:scale-95`}>
                    <ChefHat size={20}/> Mulai Memasak
                 </button>

                 <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-5">
                    <div className="flex justify-between items-center">
                       <h3 className="font-bold text-slate-800 dark:text-slate-200 text-sm">{tr('Bahan-Bahan', 'Ingredients')}</h3>
                       <span className={`font-mono font-bold text-xs ${th.text} ${th.light} px-2.5 py-1 rounded-md`}>{cookPortion} Porsi</span>
                    </div>
                    <input type="range" min="1" max="20" value={cookPortion} onChange={e => setCookPortion(Number(e.target.value))} className="w-full" style={{accentColor:th.hex}}/>
                    <ul className="space-y-3">
                       {r.ingredients.map((ing, i) => (
                           <li key={i} className="flex justify-between items-center border-b border-slate-100 dark:border-slate-800 pb-2.5 last:border-0 last:pb-0">
                               <span className="text-sm font-semibold text-slate-700 dark:text-slate-300 capitalize flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600"/>{ing.name}</span>
                               <span className={`font-mono font-black text-sm ${th.text}`}>{(ing.amount * sRatio).toPrecision(4).replace(/\.0+$/,'').replace(/(\.\d*?[1-9])0+$/,'$1')} <span className="text-slate-400 font-medium">{ing.unit}</span></span>
                           </li>
                       ))}
                    </ul>
                 </div>
                 
                 <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">
                    <h3 className="font-bold text-slate-800 dark:text-slate-200 text-sm">{tr('Langkah Memasak', 'Cooking Steps')}</h3>
                    <ul className="space-y-4">
                       {r.steps.map((s, i) => (
                           <li key={i} className="flex gap-4">
                               <div className={`w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-black ${th.light} ${th.text}`}>{i+1}</div>
                               <div className="flex-1 text-sm font-medium text-slate-700 dark:text-slate-300 leading-relaxed pt-0.5">
                                 {s.text}
                                 {s.timerMs > 0 && <span className={`block mt-1.5 text-xs font-bold w-max px-2 py-1 rounded-md ${th.light} ${th.text}`}><Timer size={10} className="inline mr-1 -mt-0.5"/>{Math.round(s.timerMs/60000)}m wk.</span>}
                               </div>
                           </li>
                       ))}
                    </ul>
                 </div>
              </div>
           );
        }

        const filtered = cookRecipes.filter(r => (cookFilter === 'Semua' || (r.tags && r.tags.some(t => t.toLowerCase().includes(cookFilter.toLowerCase())))) && (r.title.toLowerCase().includes(cookSearch.toLowerCase()) || r.desc.toLowerCase().includes(cookSearch.toLowerCase())));

        return (
          <>
            <div className="fade-in space-y-4 pt-2 pb-48">
              <div className="flex items-center mb-1">
                 <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab8')}.</h2>
              </div>
              
              <div className="flex items-center gap-2 mb-2 mt-2">
                <div className="flex-1 flex items-center gap-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl px-4 py-3 shadow-sm">
                  <Search size={16} className="text-slate-400 flex-shrink-0"/>
                  <input type="text" placeholder="Cari resep..." className="flex-1 bg-transparent outline-none text-sm font-medium text-slate-700 dark:text-slate-300 placeholder:text-slate-400" value={cookSearch} onChange={e=>setCookSearch(e.target.value)}/>
                  {cookSearch&&<button onClick={()=>setCookSearch('')}><X size={14} className="text-slate-400"/></button>}
                </div>
                <button onClick={() => { setCookSelectedId(null); setCookActiveView('form'); }} className={`h-[46px] w-[46px] flex-shrink-0 ${th.bg} text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90`}><Plus size={20}/></button>
              </div>

              <div className="flex gap-1.5 overflow-x-auto hide-scrollbar pb-1">
                {['Semua','Sarapan','Makan Siang','Makan Malam','Camilan','Minuman'].map(f => (
                  <button key={f} onClick={() => setCookFilter(f)} className={`px-4 py-2 rounded-[1rem] text-xs font-black whitespace-nowrap active:scale-95 transition-all ${cookFilter === f ? th.bg+' text-white shadow-md' : 'bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700'}`}>{f}</button>
                ))}
              </div>

              {renderTimers()}

              <div className="grid grid-cols-2 gap-3 mt-4">
                 {filtered.length === 0 && (
                     <div className="col-span-2 text-center py-16 bg-slate-50 dark:bg-slate-800 border border-dashed border-slate-200 dark:border-slate-700 rounded-3xl mt-4">
                        <div className="h-16 w-16 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-4 flex items-center justify-center text-slate-400">
                           <Utensils size={28}/>
                        </div>
                        <p className="text-slate-500 dark:text-slate-400 text-sm font-bold">Belum ada resep ditemukan</p>
                        <button onClick={() => { setCookSelectedId(null); setCookActiveView('form'); }} className={`mt-4 px-4 py-2 rounded-xl text-xs font-bold text-white ${th.bg} shadow-md`}>Buat Resep Baru</button>
                     </div>
                 )}
                 {filtered.map(r => (
                    <button key={r.id} onClick={() => { setCookSelectedId(r.id); setCookPortion(r.defaultPortions); setCookActiveView('detail'); }} className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl p-3 text-left shadow-sm active:scale-[0.98] transition-all flex flex-col h-full hover:border-slate-300 dark:hover:border-slate-600">
                       {r.photo ? (
                           <img src={r.photo} alt={r.title} className="w-full h-28 object-cover rounded-xl mb-3 bg-slate-100" />
                       ) : (
                           <div className={`w-full h-28 rounded-xl mb-3 flex items-center justify-center ${th.light} opacity-50`}>
                             <Utensils size={24} className={th.text}/>
                           </div>
                       )}
                       <div className="mt-auto">
                          <h3 className="font-bold text-slate-800 dark:text-slate-200 text-[0.8125rem] leading-snug line-clamp-2 mb-1.5">{r.title}</h3>
                          <p className="text-[0.625rem] text-slate-400 uppercase tracking-widest font-bold flex items-center gap-2"><Timer size={10}/> {r.steps.length} Lngk</p>
                       </div>
                    </button>
                 ))}
              </div>
            </div>

          </>
        );
      };

      /* ════════════════════════════════════
         BERSIH UTILITY
      ═════════════════════════════════════ */
      const renderBersih = () => {
        
        const formatTime = (d) => d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const formatDay = (d) => d.toLocaleDateString(language==='id'?'id-ID':'en-US', {weekday:'long', month:'short', day:'numeric'});
        
        const addZone = (e) => {
          e.preventDefault();
          if(!newZone.trim()) return;
          setKlipZones(prev => [...prev, {id: Date.now().toString(), name: newZone.trim(), isDone: false}]);
          setNewZone('');
          playClick('soft');
        };
        const toggleZone = (id) => { setKlipZones(prev => prev.map(z => z.id === id ? {...z, isDone: !z.isDone} : z)); playClick('soft'); };
        const delZone = (e, id) => { e.stopPropagation(); setKlipZones(prev => prev.filter(z => z.id !== id)); playClick('soft'); };
        const resetToday = () => { setKlipZones(prev => prev.map(z => ({...z, isDone: false}))); playClick('success'); };
        
        const doneCount = klipZones.filter(z => z.isDone).length;
        const totalCount = klipZones.length;
        const progress = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

        return (
          <div className="fade-in space-y-4 pt-2 pb-48">
            <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab7')}.</h2>
            <div className="flex justify-between items-end mb-6">
               <div>
                  <p className="text-sm font-bold text-slate-500 dark:text-slate-400">{formatDay(now)}</p>
                  <p className="text-2xl font-black text-slate-900 dark:text-white tracking-widest">{formatTime(now)}</p>
               </div>
            </div>
            
            {/* Progress */}
            <div className="bg-white dark:bg-slate-900 rounded-2xl p-4 shadow-sm border border-slate-200 dark:border-slate-700 space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Progress</span>
                <span className={`text-xs font-black ${progress===100 ? th.text : 'text-slate-600 dark:text-slate-400'}`}>{doneCount} / {totalCount}</span>
              </div>
              <div className="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                <div className={`h-full transition-all duration-500 ease-out ${th.bg}`} style={{width: `${progress}%`}}/>
              </div>
            </div>

            {/* Input Baru */}
            <form onSubmit={addZone} className="flex gap-2 mb-6 mt-4">
              <input type="text" value={newZone} onChange={e=>setNewZone(e.target.value)} placeholder={t('bPh')} className={`flex-1 ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none text-sm font-bold text-slate-900 dark:text-white`} />
              <button type="submit" disabled={!newZone.trim()} className={`h-12 w-12 rounded-xl flex-shrink-0 flex items-center justify-center text-white transition-opacity disabled:opacity-50 ${th.bg}`}><Plus size={18}/></button>
            </form>

            {/* Grid Kartu */}
            {klipZones.length > 0 ? (
              <div className="grid grid-cols-2 gap-3 mb-6">
                {klipZones.map(z => (
                  <button key={z.id} onClick={() => toggleZone(z.id)} className={`relative p-4 rounded-2xl border text-left flex flex-col justify-between aspect-[4/3] transition-all active:scale-95 ${z.isDone ? th.bg + ' ' + th.glow + ' border-transparent' : 'bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                    <div className="flex justify-between items-start w-full">
                       <div className={`h-6 w-6 rounded-full flex items-center justify-center border-2 transition-all ${z.isDone ? 'border-white bg-white/20 text-white' : 'border-slate-300 dark:border-slate-600 bg-transparent'}`}>
                          {z.isDone && <Check size={12} strokeWidth={4} />}
                       </div>
                       <div onClick={(e)=>delZone(e, z.id)} className={`p-1.5 -m-1.5 rounded-full transition-colors ${z.isDone ? 'text-white/40 hover:text-white/80 hover:bg-white/10' : 'text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10'}`}>
                         <Trash2 size={13}/>
                       </div>
                    </div>
                    <span className={`text-sm font-bold leading-tight mt-auto ${z.isDone ? 'text-white' : 'text-slate-700 dark:text-slate-300'}`}>{z.name}</span>
                  </button>
                ))}
              </div>
            ) : (
              <div className="text-center py-10 opacity-60">
                <Sparkles size={32} className="mx-auto mb-3 text-slate-400" />
                <p className="text-sm font-bold text-slate-500 dark:text-slate-400">Belum ada ruangan</p>
              </div>
            )}

            {/* Reset */}
            {klipZones.length > 0 && (
              <button onClick={resetToday} className="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:scale-95">
                <RefreshCw size={14}/> {t('bReset')}
              </button>
            )}
          </div>
        );
      };

      /* ════════════════════════════════════
         GLOBAL SETTINGS
      ═════════════════════════════════════ */
      const renderGlobal = () => {
        if(!isGlobalOpen) return null;
        return(
          <div className="absolute inset-0 z-[100] bg-[#FAFAFA] dark:bg-[#0c0f1a] flex flex-col slide-up">
            <div className="px-6 pt-10 pb-4 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
              <h2 className="text-2xl font-black text-slate-900 dark:text-white">{t('peng')}</h2>
              <button onClick={()=>{setIsGlobalOpen(false); playClick('soft');}} className="h-10 w-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center active:scale-90"><X size={19} className="text-slate-600 dark:text-slate-400"/></button>
            </div>
            <div className="flex-1 overflow-y-auto px-6 py-6 space-y-8 hide-scrollbar">
              <section>
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Palette size={14}/> {t('tampil')}</h3>
                <div className="space-y-3">
                  <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
                    <p className="text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">{t('warna')}</p>
                    <div className="flex gap-4">
                      {Object.keys(THEMES).map(k=>{
                        const isLocked = !isProMode && k !== 'slate';
                        const swatches={slate:'bg-slate-800 border-2 border-transparent dark:border-slate-600',indigo:'bg-indigo-600 border-2 border-transparent',emerald:'bg-emerald-500 border-2 border-transparent',rose:'bg-rose-500 border-2 border-transparent',violet:'bg-violet-600 border-2 border-transparent'};
                        return (
                        <button key={k} onClick={()=>{if(isLocked){toast('Tema eksklusif Pro!');return;}setActiveTheme(k)}} className={`relative h-11 w-11 rounded-full flex items-center justify-center ${swatches[k]} ${activeTheme===k?'ring-4 ring-offset-2 scale-110 '+THEMES[k].border:''} ${isLocked?'opacity-50 grayscale':''}`}>
                          {activeTheme===k&&<Check size={18} className="text-white"/>}
                          {isLocked&&<Crown size={12} className="absolute text-white/90 drop-shadow flex-shrink-0"/>}
                        </button>
                      )})}
                    </div>
                  </div>
                  
                  <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
                    <div>
                      <p className="font-bold text-slate-700 dark:text-slate-300 text-sm">{t('gelap')}</p>
                      <p className="text-[0.625rem] text-slate-400 mt-0.5">{t('gelap_desc')}</p>
                    </div>
                    <div className={`w-14 h-8 rounded-full relative flex-shrink-0 cursor-pointer transition-colors ${darkMode ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={()=>setDarkMode(!darkMode)}>
                      <div className={`w-6 h-6 rounded-full absolute top-[4px] bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${darkMode ? 'translate-x-7' : 'translate-x-1'}`}/>
                    </div>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
                    <p className="font-bold text-slate-700 dark:text-slate-300 text-sm mb-3">{t('font')}</p>
                    <div className="flex bg-slate-200 dark:bg-slate-700/50 rounded-lg p-1 gap-1">
                      {[['small',t('kecil')],['normal',t('standar')],['large',t('besar')]].map(([v,l])=>(
                        <button key={v} onClick={()=>setFontSize(v)} className={`flex-1 py-1.5 rounded-md text-xs font-bold transition-all ${fontSize===v?'bg-white dark:bg-slate-900 shadow-sm text-slate-900 dark:text-white':'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>{l}</button>
                      ))}
                    </div>
                  </div>
                </div>
              </section>

              <div className="h-px bg-slate-200 dark:bg-slate-800"/>

              <section>
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Volume2 size={14}/> {t('person')}</h3>
                <div className="space-y-3">
                  <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 space-y-3">
                    <div className="flex justify-between items-center">
                      <div>
                        <p className="font-bold text-slate-700 dark:text-slate-300 text-sm">{t('haptics')}</p>
                        <p className="text-[0.625rem] text-slate-400 mt-0.5">{t('haptics_desc')}</p>
                      </div>
                      <div className={`w-14 h-8 rounded-full relative flex-shrink-0 cursor-pointer transition-colors ${haptics ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={()=>{const next=!haptics; setHaptics(next); if(next) setTimeout(()=>playClick('success'),50);}}>
                        <div className={`w-6 h-6 rounded-full absolute top-[4px] bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${haptics ? 'translate-x-7' : 'translate-x-1'}`}/>
                      </div>
                    </div>
                    {haptics && (
                      <div>
                        <div className="flex justify-between items-center mb-1.5">
                          <p className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest">{t('sfx_vol')}</p>
                          <span className="text-[0.625rem] font-bold text-slate-500 dark:text-slate-400">{Math.round(soundVol*100)}%</span>
                        </div>
                        <input type="range" min="0" max="1" step="0.05" value={soundVol} onChange={e=>setSoundVol(parseFloat(e.target.value))} onMouseUp={()=>playClick('soft')} onTouchEnd={()=>playClick('soft')} className="w-full" style={{accentColor:th.hex}}/>
                      </div>
                    )}
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
                    <p className="font-bold text-slate-700 dark:text-slate-300 text-sm mb-3">{t('motion')}</p>
                    <div className="flex bg-slate-200 dark:bg-slate-700/50 rounded-lg p-1 gap-1">
                      {[['default',t('m_default')],['fast',t('m_fast')],['none',t('m_reduce')]].map(([v,l])=>(
