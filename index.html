                          <button onClick={()=>{setWipeStep(0);setWipePin('');}} className="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold py-3 rounded-xl active:scale-95">{tr('Batal', 'Cancel')}</button>
                          <button onClick={()=>{
                            localStorage.removeItem('klip_vault_pin_hash');
                            sessionStorage.removeItem('klip_vault_session_pin');
                            setMasterPinSet(false);
                            setVaultLocked(true);
                            setDecryptedVals({});
                            setRevealed({});
                            setVaultItems([]);
                            setWipeStep(0);
                            setWipePin('');
                            toast(tr('Semua data Brankas dihapus.', 'All Vault data deleted.'));
                          }} className="flex-1 bg-rose-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-95">
                            <Trash2 size={13}/> {tr('Hapus Semua', 'Delete All')}
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </section>
              )}
            </div>
          </div>
        );
      };

      /* ════════════════════════════════════
         TUGAS UTILITY
      ═════════════════════════════════════ */
      const TUGAS_CATS = [
        { id: 'kuliah',  label: 'Kuliah',  hex: '#6366f1', bg: 'rgba(99,102,241,0.12)' },
        { id: 'kerja',   label: 'Kerja',   hex: '#0ea5e9', bg: 'rgba(14,165,233,0.12)' },
        { id: 'pribadi', label: 'Pribadi', hex: '#ec4899', bg: 'rgba(236,72,153,0.12)' },
        { id: 'rumah',   label: 'Rumah',   hex: '#10b981', bg: 'rgba(16,185,129,0.12)' },
        { id: 'lainnya', label: 'Lainnya', hex: '#f59e0b', bg: 'rgba(245,158,11,0.12)' },
      ];
      const getCat = (id) => TUGAS_CATS.find(c => c.id === id) || TUGAS_CATS[4];

      const renderTugas = () => {
          const addTask = (e) => {
              e.preventDefault();
              if(!newTugas.trim() || !newTugasDate || !newTugasTime) return;
              
              const [yyyy, mn, dd] = newTugasDate.split('-').map(Number);
              const [hh, m] = newTugasTime.split(':').map(Number);
              let d = new Date(yyyy, mn - 1, dd, hh, m, 0, 0);
              
              const timestamp = d.getTime();
              setTugasItems(prev => [...prev, {
                  id: Date.now().toString(),
                  text: newTugas.trim(),
                  deadline: timestamp,
                  category: newTugasCategory,
                  isDone: false,
                  createdAt: Date.now()
              }]);
              setNewTugas('');
              setNewTugasTime('23:59');
              playClick('soft');
          };


          const toggleTask = (id) => {
              setTugasItems(prev => {
                  let allowPlay = false;
                  const res = prev.map(t => {
                      if (t.id === id) {
                          // Prevent ghost click immediately after creation (mobile web touch bug)
                          if (!t.isDone && Date.now() - t.createdAt < 500) return t;
                          allowPlay = true;
                          return { ...t, isDone: !t.isDone };
                      }
                      return t;
                  });
                  if (allowPlay) playClick('success');
                  return res;
              });
          };

          const delTask = (id) => {
              setTugasItems(prev => prev.filter(t => t.id !== id));
              playClick('soft');
          };

          const formatDeadline = (ts) => {
              const d = new Date(ts);
              const today = new Date();
              const tmx = new Date(); tmx.setDate(tmx.getDate() + 1);
              
              const timeOpt = { hour: '2-digit', minute: '2-digit' };
              if (d.toDateString() === today.toDateString()) {
                  return `Hari ini, ${d.toLocaleTimeString(language==='id'?'id-ID':'en-US', timeOpt)}`;
              } else if (d.toDateString() === tmx.toDateString()) {
                  return `Besok, ${d.toLocaleTimeString(language==='id'?'id-ID':'en-US', timeOpt)}`;
              }
              return d.toLocaleDateString(language==='id'?'id-ID':'en-US', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit' });
          };

          const allIncomplete = tugasItems.filter(t => !t.isDone).sort((a,b) => a.deadline - b.deadline);
          const incomplete = tugasFilter === 'semua' ? allIncomplete : allIncomplete.filter(t => (t.category || 'lainnya') === tugasFilter);
          const completed = tugasItems.filter(t => t.isDone).sort((a,b) => b.createdAt - a.createdAt);
          // Categories that have at least one active task (for filter bar)
          const activeCatIds = [...new Set(allIncomplete.map(t => t.category || 'lainnya'))];


          return (
              <div className="fade-in space-y-4 pt-2 pb-48">
                  <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab9')}.</h2>
                  
                  {/* Category filter bar — only shown when >1 categories have active tasks */}
                  {activeCatIds.length > 1 && (
                      <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-1 pt-1">
                          <button
                              onClick={() => { setTugasFilter('semua'); playClick('soft'); }}
                              className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[0.625rem] font-black uppercase tracking-widest border transition-all active:scale-95 ${
                                  tugasFilter === 'semua'
                                  ? 'bg-slate-900 dark:bg-white text-white dark:text-slate-900 border-transparent shadow-md'
                                  : 'bg-transparent text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'
                              }`}>
                              Semua
                          </button>
                          {TUGAS_CATS.filter(c => activeCatIds.includes(c.id)).map(cat => (
                              <button key={cat.id}
                                  onClick={() => { setTugasFilter(cat.id); playClick('soft'); }}
                                  className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[0.625rem] font-black uppercase tracking-widest border transition-all active:scale-95`}
                                  style={{
                                      background: tugasFilter === cat.id ? cat.hex : 'transparent',
                                      color: tugasFilter === cat.id ? '#ffffff' : cat.hex,
                                      borderColor: tugasFilter === cat.id ? 'transparent' : cat.hex + '55',
                                      boxShadow: tugasFilter === cat.id ? `0 4px 12px ${cat.hex}44` : 'none'
                                  }}>
                                  {cat.label}
                              </button>
                          ))}
                      </div>
                  )}

                  {/* ─── Wavy Timeline ─── */}

                  {/* Task labels above wave box — staggered rows to prevent overlap */}
                  {incomplete.length > 0 && (
                      <div className="relative mt-3" style={{height:'2rem'}}>
                          {incomplete.map((branchTask, idx) => {
                              const num = incomplete.length;
                              const spacing = 70 / Math.max(1, num);
                              const left = 15 + (idx * spacing) + (spacing / 2);
                              const hoursLeft = (branchTask.deadline - now.getTime()) / 3600000;
                              const cat = getCat(branchTask.category || 'lainnya');
                              const labelColor = hoursLeft <= 0 ? '#ef4444' : hoursLeft <= 12 ? '#f97316' : hoursLeft <= 24 ? '#f59e0b' : cat.hex;
                              const rowTop = idx % 2 === 0 ? '0px' : '11px';
                              const tickTop = idx % 2 === 0 ? '9px' : '20px';

                              return (
                                  <React.Fragment key={`lbl-${branchTask.id}`}>
                                      <span className="absolute pointer-events-none" style={{
                                          left:`${left}%`, transform:'translateX(-50%)',
                                          top: tickTop, width:'1px', height:'4px',
                                          background: labelColor, display:'block', opacity:0.4
                                      }}/>
                                      <span className="absolute font-black uppercase leading-none pointer-events-none"
                                          style={{
                                              left:`${left}%`, top: rowTop,
                                              transform:'translateX(-50%)',
                                              fontSize:'0.4rem', letterSpacing:'0.04em',
                                              maxWidth:'44px', textAlign:'center',
                                              overflow:'hidden', whiteSpace:'nowrap',
                                              textOverflow:'ellipsis', display:'block',
                                              color: labelColor,
                                              background: labelColor + '1a',
                                              padding:'1px 3px', borderRadius:'3px',
                                          }}>
                                          {branchTask.text}
                                      </span>
                                  </React.Fragment>
                              );
                          })}
                      </div>
                  )}

                  {/* Wave container — ref passed to RAF loop */}
                  <div ref={tugasWaveRef}
                       className={`bg-slate-50 dark:bg-slate-800/60 rounded-[2rem] border border-slate-200 dark:border-slate-700 h-20 mb-4 relative overflow-hidden shadow-inner ${incomplete.length === 0 ? 'mt-4' : ''}`}>

                      {/* Animated sine wave SVG — horizontal scroll only */}
                      <div className="absolute inset-0 z-0 pointer-events-none">
                          <svg className="w-[200%] h-[150%] absolute top-1/2 -translate-y-1/2 -left-[100%] animate-[wave_12s_linear_infinite]"
                               preserveAspectRatio="none" viewBox="0 0 100 50" fill="none" strokeWidth="1.5">
                              <style>{`@keyframes wave{0%{transform:translate(0,-50%)}100%{transform:translate(50%,-50%)}}`}</style>
                              <path className="stroke-slate-800/55 dark:stroke-white/55"
                                    d="M0,25 Q12.5,10 25,25 T50,25 T75,25 T100,25"
                                    vectorEffect="non-scaling-stroke" strokeLinecap="round"/>
                          </svg>
                      </div>

                      {/* Poles and dots — positioned dynamically by RAF loop via refs */}
                      {incomplete.map((branchTask, idx) => {
                          const num = incomplete.length;
                          const spacing = 70 / Math.max(1, num);
                          const left = 15 + (idx * spacing) + (spacing / 2);
                          const hoursLeft = (branchTask.deadline - now.getTime()) / 3600000;
                          const cat = getCat(branchTask.category || 'lainnya');
                          // Urgency overrides category color for poles/dots
                          const rgb = hoursLeft <= 0  ? '239,68,68'
                                    : hoursLeft <= 12 ? '249,115,22'
                                    : hoursLeft <= 24 ? '245,158,11'
                                    : cat.hex.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',');

                          const border = darkMode ? '#1e293b' : '#ffffff';

                          return (
                              <React.Fragment key={`wavenode-${branchTask.id}`}>
                                  {/* Pole: top fixed at 6px, height set by RAF each frame */}
                                  <div ref={el => { tugasPoleRefs.current[branchTask.id] = el; }}
                                       className="absolute z-10 pointer-events-none"
                                       style={{
                                           left: `${left}%`,
                                           top: '6px',
                                           width: '2px',
                                           height: '0px',
                                           transform: 'translateX(-50%)',
                                           background: `linear-gradient(to bottom, rgba(${rgb},0.0), rgba(${rgb},0.85))`
                                       }}
                                  />
                                  {/* Dot: top set by RAF each frame to wave Y minus half-dot */}
                                  <div ref={el => { tugasDotRefs.current[branchTask.id] = el; }}
                                       className="absolute z-20 pointer-events-none"
                                       style={{
                                           left: `${left}%`,
                                           top: '30px',
                                            boxSizing: 'border-box',
                                           width: '13px',
                                           height: '13px',
                                           borderRadius: '50%',
                                           background: `rgb(${rgb})`,
                                           border: `2.5px solid ${border}`,
                                           boxShadow: `0 2px 10px rgba(${rgb},0.55)`,
                                           transform: 'translateX(-50%)'
                                       }}
                                  />
                              </React.Fragment>
                          );
                      })}
                  </div>


                  {/* Input Form */}
                  <form onSubmit={addTask} className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl p-4 shadow-sm mb-6">
                      <input type="text" value={newTugas} onChange={e=>setNewTugas(e.target.value)} placeholder={tr('Tugas baru...', 'New task...')} className="w-full bg-transparent outline-none text-sm font-bold text-slate-900 dark:text-white placeholder:text-slate-400 mb-3" />
                      {/* Category pills */}
                      <div className="flex gap-1.5 mb-3 flex-wrap">
                          {TUGAS_CATS.map(cat => (
                              <button key={cat.id} type="button"
                                  onClick={() => { setNewTugasCategory(cat.id); playClick('soft'); }}
                                  className="px-2.5 py-1 rounded-full text-[0.575rem] font-black uppercase tracking-widest border transition-all active:scale-95"
                                  style={{
                                      background: newTugasCategory === cat.id ? cat.hex : 'transparent',
                                      color: newTugasCategory === cat.id ? '#ffffff' : cat.hex,
                                      borderColor: newTugasCategory === cat.id ? 'transparent' : cat.hex + '66',
                                      boxShadow: newTugasCategory === cat.id ? `0 2px 8px ${cat.hex}44` : 'none'
                                  }}>
                                  {cat.label}
                              </button>
                          ))}
                      </div>
                      <div className="grid grid-cols-2 gap-2 relative">
                          <input type="date" value={newTugasDate} onChange={e=>setNewTugasDate(e.target.value)} required className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 outline-none text-[0.6875rem] font-bold text-slate-700 dark:text-slate-300 appearance-none`} />
                          <input type="time" value={newTugasTime} onChange={e=>setNewTugasTime(e.target.value)} required className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 outline-none text-[0.6875rem] font-bold text-slate-700 dark:text-slate-300 appearance-none`} />
                          <button type="submit" disabled={!newTugas.trim() || !newTugasDate || !newTugasTime} className={`col-span-2 h-[42px] w-full rounded-xl flex items-center justify-center text-white text-xs font-black transition-opacity disabled:opacity-50 ${th.bg} shadow-md active:scale-95`}><Plus size={16} className="mr-1"/> Tambah</button>
                      </div>
                  </form>

                  <div className="pt-2 space-y-3">
                      {incomplete.map((task) => {
                          const nowTime = now.getTime();
                          const timeDiff = task.deadline - nowTime;
                          const hoursLeft = timeDiff / (1000 * 60 * 60);
                          
                          let titleColor = 'text-slate-800 dark:text-slate-200';
                          let bgTheme = 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600';

                          if (hoursLeft <= 0) {
                              titleColor = 'text-rose-600 dark:text-rose-400 font-black';
                              bgTheme = 'bg-rose-50 dark:bg-rose-500/10 border-rose-200 dark:border-rose-500/30 shadow-md';
                          } else if (hoursLeft <= 12) {
                              titleColor = 'text-orange-600 dark:text-orange-400 font-black';
                              bgTheme = 'bg-orange-50 dark:bg-orange-500/10 border-orange-200 dark:border-orange-500/20';
                          } else if (hoursLeft <= 24) {
                              titleColor = 'text-amber-600 dark:text-amber-400 font-bold';
                              bgTheme = 'bg-amber-50/50 dark:bg-amber-500/5 border-amber-200/50 dark:border-amber-500/20';
                          }

                          return (
                              <div key={task.id} className={`p-4 rounded-[1.25rem] border transition-all ${bgTheme} flex items-center gap-3 relative overflow-hidden`}>
                                  {hoursLeft <= 0 && <div className="absolute top-0 right-0 h-full w-1 bg-rose-500"/>}
                                  <button onClick={(e) => { e.stopPropagation(); toggleTask(task.id); }} className={`h-6 w-6 rounded-[0.4rem] border-2 flex items-center justify-center transition-colors flex-shrink-0 ${hoursLeft <= 0 ? 'border-rose-500 text-rose-600' : 'border-slate-300 dark:border-slate-600'}`}>
                                      {task.isDone && <Check size={14} strokeWidth={3} />}
                                  </button>
                                  <div className="flex-1 overflow-hidden">
                                      <div className="flex items-center gap-1.5 mb-0.5">
                                          {/* Category badge */}
                                          {(() => { const cat = getCat(task.category || 'lainnya'); return (
                                              <span className="px-1.5 py-[1px] rounded-full text-[0.5rem] font-black uppercase tracking-widest"
                                                  style={{ background: cat.bg, color: cat.hex }}>
                                                  {cat.label}
                                              </span>
                                          );})()}
                                      </div>
                                      <h3 className={`text-[0.8125rem] leading-snug line-clamp-2 ${titleColor}`}>{task.text}</h3>
                                      <p className="text-[0.625rem] font-bold text-slate-500 dark:text-slate-400 mt-1 uppercase tracking-widest flex items-center gap-1.5"><Timer size={10} className="opacity-70"/> {formatDeadline(task.deadline)}</p>
                                  </div>
                                  <button onClick={(e) => { e.stopPropagation(); delTask(task.id); }} className="h-8 w-8 rounded-full flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 active:scale-90 transition-all">
                                      <Trash2 size={14}/>
                                  </button>
                              </div>
                          );
                      })}
                  </div>

                  {completed.length > 0 && (
                      <div className="mt-8 space-y-2 fade-in">
                          <p className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest pl-2">Sudah Selesai</p>
                          <div className="space-y-2">
                              {completed.map(doneTask => (
                                  <div key={doneTask.id} className="p-4 rounded-[1.25rem] border border-slate-200 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/30 flex items-center gap-3 opacity-70">
                                      <button onClick={() => toggleTask(doneTask.id)} className="h-6 w-6 rounded-[0.4rem] border-2 border-transparent bg-emerald-500 text-white flex items-center justify-center flex-shrink-0 shadow-sm active:scale-90 transition-all">
                                          <Check size={13} strokeWidth={4} />
                                      </button>
                                      <div className="flex-1 overflow-hidden line-through decoration-slate-400 text-slate-500 dark:text-slate-400">
                                          <h3 className="text-sm truncate font-medium">{doneTask.text}</h3>
                                      </div>
                                      <button onClick={() => delTask(doneTask.id)} className="h-8 w-8 rounded-full flex items-center justify-center text-slate-400 hover:text-rose-500 active:scale-90 transition-all">
                                          <Trash2 size={14}/>
                                      </button>
                                  </div>
                              ))}
                          </div>
                      </div>
                  )}
              </div>
          );
      };

      /* ════════════════════════════════════
         KLIP BUBBLE
      ═════════════════════════════════════ */
      const renderKlipBubble = () => {
        const activeTimers = cookTimers.filter(t => t.active || t.paused);
        const activeTimer = activeTimers.length > 0 ? activeTimers[0] : null;
        let remText = '';
        let pct = 0;
        if (activeTimer) {
          const rem = activeTimer.paused ? activeTimer.remainingMs : Math.max(0, activeTimer.endMs - now.getTime());
          const m = Math.floor(rem / 60000);
          const s = Math.floor((rem % 60000) / 1000);
          remText = String(m) + ':' + s.toString().padStart(2, '0');
          pct = activeTimer.durationMs ? (1 - (rem / activeTimer.durationMs)) * 100 : 100;
        }

        const isShowingToast = toastMsg && !bubbleExpanded;

        let bubbleW, bubbleH, bubbleR;
        if (bubbleExpanded) {
          bubbleW = 'w-[calc(100%-1.5rem)] max-w-[380px]'; 
          bubbleH = 'h-[160px]';
          bubbleR = 'rounded-[2.5rem]';
        } else if (isShowingToast) {
          bubbleW = 'w-auto min-w-[140px] max-w-[280px]'; bubbleH = 'h-[28px]'; bubbleR = 'rounded-[14px]';
        } else if (activeTimer) {
          bubbleW = `w-[${bubbleTimerWidth}px]`; bubbleH = 'h-[28px]'; bubbleR = 'rounded-[14px]';
        } else {
          bubbleW = `w-[${bubbleIdleWidth}px]`; bubbleH = 'h-[28px]'; bubbleR = 'rounded-[14px]';
        }

        return (
          <>
            {bubbleExpanded && <div className="absolute inset-0 z-[140] bg-transparent" onClick={() => { setBubbleExpanded(false); playClick('soft'); }} />}
            <div className="absolute left-1/2 -translate-x-1/2 z-[150] pointer-events-none flex justify-center w-full" style={{ top: `${bubbleTopOffset}px` }}>
              <div
                onClick={(e) => { e.stopPropagation(); if (!bubbleExpanded) { setBubbleExpanded(true); playClick('soft'); } }}
                className={bubbleW + " " + bubbleH + " " + bubbleR + " bg-black dark:bg-[#050505] shadow-2xl flex flex-col pointer-events-auto border border-white/[0.08] cursor-pointer overflow-hidden relative"}
                style={{ transition: 'all 0.5s cubic-bezier(0.34, 1.3, 0.64, 1)' }}
              >
                {/* Collapsed State */}
                {!bubbleExpanded && (
                  <div className="absolute inset-0 flex items-center justify-center px-3.5 gap-2 whitespace-nowrap">
                    {isShowingToast ? (
                       <span className="text-white text-[0.6875rem] font-bold truncate">{toastMsg}</span>
                    ) : activeTimer ? (
                       <div className="flex items-center justify-between w-full px-2.5">
                          <span className="text-white text-[0.8125rem] font-mono font-black">{remText}</span>
                          <Timer size={14} className={(activeTimer.paused ? "text-amber-400" : "text-emerald-400") + " " + (!activeTimer.paused ? "animate-pulse" : "")} />
                       </div>
                    ) : null}
                  </div>
                )}

                {/* Expanded State */}
                {bubbleExpanded && (
                  <div className="flex flex-col w-full h-full relative z-10 fade-in">
                    {activeTimer ? (
                      <div className="flex flex-col w-full h-full p-4 justify-between">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-emerald-500/20 blur-2xl rounded-t-full pointer-events-none" />
                        
                        <div className="flex items-center justify-between w-full relative z-10 px-2 pt-1">
                          <div className="flex items-center gap-3 flex-1 min-w-0">
                            <div className="h-10 w-10 bg-emerald-500/20 rounded-xl flex items-center justify-center flex-shrink-0">
                               <Timer size={20} className={activeTimer.paused ? "text-amber-400" : "text-emerald-400"} />
                            </div>
                            <div className="flex flex-col truncate">
                               <span className="text-white font-bold text-sm truncate">{activeTimer.title}</span>
                               <span className="text-white/50 text-[0.625rem] uppercase tracking-wider">{tr('Memasak','Cooking')}</span>
                            </div>
                          </div>
                          <span className={"text-2xl font-mono font-black flex-shrink-0 ml-3 tracking-tighter " + (activeTimer.paused ? "text-amber-400" : "text-emerald-400")}>{remText}</span>
                        </div>

                        <div className="w-full px-2 mt-2 mb-2 relative z-10 flex items-center gap-2">
                          <span className="text-white/40 text-[0.625rem] font-mono">00:00</span>
                          <div className="flex-1 h-1.5 bg-white/10 rounded-full overflow-hidden relative">
                            <div className="absolute top-0 left-0 bottom-0 bg-white transition-all duration-1000 linear" style={{ width: Math.min(100, Math.max(0, pct)) + '%' }} />
                          </div>
                          <span className="text-white/40 text-[0.625rem] font-mono">
                            {Math.floor((activeTimer.durationMs || 0)/60000)}:{(Math.floor((activeTimer.durationMs || 0)/1000)%60).toString().padStart(2,'0')}
                          </span>
                        </div>

                        <div className="flex justify-center items-center gap-6 relative z-10 pb-1">
                          <button onClick={(e) => { e.stopPropagation(); skipTimer(activeTimer.id, 60000); }} className="text-white/70 hover:text-white active:scale-90 transition-all font-bold text-xs">-1m</button>
                          
                          <button onClick={(e) => { e.stopPropagation(); toggleTimerPause(activeTimer.id); }} className={"h-10 w-12 rounded-2xl flex items-center justify-center active:scale-90 transition-all " + (activeTimer.paused ? "bg-amber-500 text-black" : "bg-white text-black")}>
                            {activeTimer.paused ? <Play size={18} fill="currentColor" /> : <Pause size={18} fill="currentColor" />}
                          </button>
                          
                          <button onClick={(e) => { e.stopPropagation(); skipTimer(activeTimer.id, -60000); }} className="text-white/70 hover:text-white active:scale-90 transition-all font-bold text-xs">+1m</button>
                          
                          <button onClick={(e) => { e.stopPropagation(); endTimer(activeTimer.id); setBubbleExpanded(false); }} className="absolute right-2 h-8 w-8 bg-white/10 hover:bg-rose-500/50 hover:text-white text-white/50 rounded-full flex items-center justify-center active:scale-90 transition-all">
                            <X size={14}/>
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div className="flex flex-col w-full h-full p-4 relative z-10 gap-3">
                        {/* Draft & Extract Section */}
                        {(bubbleDraft || bubbleExtrak) && (
                        <div className={"grid gap-2 flex-shrink-0 " + (bubbleDraft && bubbleExtrak ? "grid-cols-2" : "grid-cols-1")}>
                          {/* Quick Draft */}
                          {bubbleDraft && (
                            <div className="bg-white/5 border border-white/10 rounded-2xl p-3 flex flex-col justify-between relative overflow-hidden group hover:bg-white/10 transition-colors cursor-text" onClick={(e) => { e.currentTarget.querySelector('input').focus(); }}>
                               <div className="absolute top-0 right-0 p-2 opacity-10"><Type size={24}/></div>
                               <span className="text-white/50 text-[0.625rem] font-bold uppercase tracking-wider mb-2 relative z-10">{tr('Catat Cepat','Quick Draft')}</span>
                               <input 
                                 type="text"
                                 placeholder={tr('Tulis draf...','Write draft...')}
                                 className="w-full bg-transparent text-white text-xs placeholder-white/20 outline-none relative z-10"
                                 onKeyDown={(e) => {
                                   if (e.key === 'Enter' && e.target.value.trim()) {
                                      const val = e.target.value.trim();
                                      const newDraft = draftText ? draftText + '\n' + val : val;
                                      setDraftText(newDraft);
                                      e.target.value = '';
                                      toast(tr('Disimpan ke Draf!','Saved to Drafts!'));
                                   }
                                 }}
                               />
                            </div>
                          )}

                          {/* Quick Extract */}
                          {bubbleExtrak && (
                            <div className="bg-white/5 border border-white/10 rounded-2xl p-3 flex flex-col justify-between relative overflow-hidden group hover:bg-white/10 transition-colors cursor-text" onClick={(e) => { e.currentTarget.querySelector('input').focus(); }}>
                               <div className="absolute top-0 right-0 p-2 opacity-10"><Search size={24}/></div>
                               <span className="text-white/50 text-[0.625rem] font-bold uppercase tracking-wider mb-2 relative z-10">{tr('Ekstrak Cepat','Quick Extract')}</span>
                               <input 
                                 type="text"
                                 placeholder={tr('Tempel teks...','Paste text...')}
                                 className="w-full bg-transparent text-white text-xs placeholder-white/20 outline-none relative z-10"
                                 onKeyDown={(e) => {
                                   if (e.key === 'Enter' && e.target.value.trim()) {
                                      setEkstrakText(e.target.value);
                                      toast(tr('Mengekstrak data...','Extracting data...'));
                                      e.target.value = '';
                                   }
                                 }}
                               />
                            </div>
                          )}
                        </div>
                      )}

                        {/* Extract Result Summary (If any) */}
                        {ekstrakRes && (ekstrakRes.links?.length > 0 || ekstrakRes.emails?.length > 0 || ekstrakRes.phones?.length > 0) && (
                           <div className="flex items-center justify-between bg-emerald-500/10 border border-emerald-500/20 rounded-xl px-3 py-2 flex-shrink-0 cursor-pointer hover:bg-emerald-500/20 transition-colors" onClick={() => { setActiveTab('tab1'); setBubbleExpanded(false); }}>
                              <span className="text-emerald-400 text-[0.6875rem] font-bold">
                                {ekstrakRes.links?.length || 0} Link, {ekstrakRes.emails?.length || 0} Email, {ekstrakRes.phones?.length || 0} Phone
                              </span>
                              <span className="text-emerald-300 text-[0.625rem] font-bold uppercase tracking-wider">{tr('Lihat','View')}</span>
                           </div>
                        )}

                        {/* Logs Section */}
                        <div className="flex-1 overflow-y-auto hide-scrollbar flex flex-col min-h-0 bg-white/[0.02] border border-white/5 rounded-2xl p-3 relative">
                          <button onClick={(e) => { e.stopPropagation(); setBubbleExpanded(false); }} className="absolute top-2 right-2 h-6 w-6 bg-white/5 hover:bg-rose-500/50 hover:text-white text-white/30 rounded-full flex items-center justify-center transition-all z-20">
                            <X size={10}/>
                          </button>
                          <span className="text-white/30 text-[0.5625rem] font-black uppercase tracking-[0.12em] flex items-center gap-1.5 mb-2 flex-shrink-0"><Sparkles size={10}/> {tr('Log Sistem','System Logs')}</span>
                          {sysLogs.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full opacity-25 pb-4">
                               <FileText size={16} className="mb-1 text-white" />
                               <p className="text-white text-[0.625rem]">{tr('Kosong.','Empty.')}</p>
                            </div>
                          ) : (
                            <div className="space-y-2 pb-2">
                              {sysLogs.map(log => (
                                <div key={log.id} className="flex gap-2 text-xs fade-in">
                                  <span className="text-white/25 font-mono text-[0.625rem] flex-shrink-0 pt-[1px]">{log.time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                  <span className="text-white/70 leading-snug text-[0.6875rem] break-all">{log.msg}</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </>
        );
      };

      /* ════════════════════════════════════
         ROOT
      ═════════════════════════════════════ */
      return(
        <div className="fixed inset-0 bg-[#FAFAFA] dark:bg-[#0c0f1a] flex flex-col overflow-hidden sm:max-w-md sm:mx-auto sm:border-x sm:border-slate-200 dark:border-slate-800 pb-[env(safe-area-inset-bottom)]">
          {renderKlipBubble()}
          {reduceMotion !== 'default' && (
            <style>
              {reduceMotion === 'fast' 
                 ? `*, *::before, *::after { animation-duration: 0.1s !important; transition-duration: 0.15s !important; }`
                 : `*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }`
              }
            </style>
          )}
          
          {showSplash&&(
            <div className="absolute inset-0 bg-[#FAFAFA] dark:bg-slate-950 flex flex-col items-center justify-center splash-bg-anim">
              <div className="flex flex-col items-center gap-5 splash-anim">
                <div className={`h-24 w-24 rounded-[2rem] ${th.bg} flex items-center justify-center shadow-2xl relative overflow-hidden`}>
                  <div className="absolute inset-0 bg-white/10" style={{clipPath:'polygon(0 0, 100% 0, 100% 50%, 0 100%)'}}/>
                  <Scissors size={48} className="text-white stroke-[2.5] relative z-10"/>
                </div>
                <div className="text-center">
                  <h1 className="text-4xl font-black tracking-tight text-slate-900 dark:text-white">Klip.</h1>
                  <p className="text-sm font-bold text-slate-400 mt-1 uppercase tracking-widest">{t('util')}</p>
                </div>
              </div>
            </div>
          )}

          {drawerOpen&&<div className="absolute inset-0 bg-slate-900/40 dark:bg-black/40  z-40" onClick={()=>snapDrawer(false)}/>}

          <div className="px-6 pt-10 pb-2 z-10 flex justify-between items-center bg-[#FAFAFA]/90 dark:bg-[#0c0f1a]/90 backdrop-blur-md flex-shrink-0">
            <div className="flex items-center gap-2">
              <Scissors size={18} className="text-slate-900 dark:text-white stroke-[2.5]"/>
              <h1 className="text-xl font-black tracking-tight text-slate-900 dark:text-white">Klip.</h1>
            </div>
            <div className="flex items-center gap-2.5">
              {isProMode&&<div className="bg-amber-50 dark:bg-amber-500/15 text-amber-600 dark:text-amber-400 px-2.5 py-1 rounded-full text-[0.625rem] font-black tracking-widest uppercase flex items-center gap-1 border border-amber-200 dark:border-amber-500/30"><Crown size={10}/> Pro</div>}
              <button onClick={()=>{setIsGlobalOpen(true); playClick('soft');}} className="h-8 w-8 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><Settings2 size={15}/></button>
            </div>
          </div>

          <main className={`flex-1 overflow-y-auto hide-scrollbar relative z-0 ${leftHanded ? 'pl-16 pr-6' : 'pl-6 pr-16'}`}>
            {activeTab==='ekstrak'&&renderEkstrak()}
            {activeTab==='brankas'&&renderBrankas()}
            {activeTab==='draft'  &&renderDraft()}
            {activeTab==='hitung' &&renderTools()}
            {activeTab==='sandi'  &&renderSandi()}
            {activeTab==='warna'  &&renderWarna()}
            {activeTab==='bersih' &&renderBersih()}
            {activeTab==='masak'  &&renderMasak()}
            {activeTab==='tugas'  &&renderTugas()}
          </main>

          {renderSmartDrawer()}
          {renderGlobal()}

          {/* Side Dial */}
          {isDialOpen&&<div className="absolute inset-0 z-20" onClick={()=>setIsDialOpen(false)}/>}
          <div className={`absolute ${leftHanded?'left-0':'right-0'} top-1/2 -translate-y-1/2 z-30 transition-all duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] ${drawerOpen||isGlobalOpen?'opacity-0 pointer-events-none '+(leftHanded?'-translate-x-10':'translate-x-10'):'opacity-100'}`}>
            <div className={`relative bg-slate-900/95 backdrop-blur-xl shadow-2xl transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] overflow-hidden ${isDialOpen?'w-24 h-[400px] '+(leftHanded?'rounded-r-[48px] border-y border-r border-slate-700/30':'rounded-l-[48px] border-y border-l border-slate-700/30'):'w-12 h-28 '+(leftHanded?'rounded-r-[28px] cursor-pointer hover:w-14 hover:shadow-[8px_0_30px_rgba(0,0,0,0.3)]':'rounded-l-[28px] cursor-pointer hover:w-14 hover:shadow-[-8px_0_30px_rgba(0,0,0,0.3)]')}`}
              onClick={()=>{if(!isDialOpen){setIsDialOpen(true); playClick('soft');}}}>
              {!isDialOpen&&(
                <><div className={`dial-indicator absolute ${leftHanded?'right-2':'left-2'} top-1/2 -translate-y-1/2 w-1 h-9 ${th.bg} rounded-full transition-all`}/>
                <div className={`absolute ${leftHanded?'right-4':'left-4'} top-1/2 -translate-y-1/2 text-white/90 transition-transform duration-300`}>
                  {DIAL_CONFIG[activeTab] ? React.cloneElement(DIAL_CONFIG[activeTab].icon, {size: 18}) : <Scissors size={18}/>}
                </div></>
              )}
              <div className={`absolute inset-0 transition-opacity duration-400 ${isDialOpen?'opacity-100':'opacity-0 pointer-events-none'}`}>
                <div className={`absolute top-0 ${leftHanded?'right-0':'left-0'} w-full h-12 bg-gradient-to-b from-slate-900 via-slate-900/80 to-transparent z-10 pointer-events-none ${leftHanded?'rounded-tr-[48px]':'rounded-tl-[48px]'}`}/>
                <div className={`absolute bottom-0 ${leftHanded?'right-0':'left-0'} w-full h-12 bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent z-10 pointer-events-none ${leftHanded?'rounded-br-[48px]':'rounded-bl-[48px]'}`}/>
                <div className={`h-full w-full overflow-y-auto snap-y snap-mandatory hide-scrollbar py-[55%] flex flex-col items-${leftHanded?'start':'end'} px-4 gap-7`}>
                  {dialVisible.map((id,idx)=>{
                    const conf = DIAL_CONFIG[id];
                    if(!conf) return null;
                    const {icon, label, pro} = conf;
                    const locked=pro&&!isProMode;const active=activeTab===id;
                    return(
                      <button key={id} onClick={e=>{e.stopPropagation();if(locked){toast(tr('Khusus Pro','Pro Only')); playClick('success'); return;}setActiveTab(id);setIsDialOpen(false); playClick('soft');}} className={`relative snap-center flex flex-col items-center gap-1.5 w-16 transition-all duration-300 ${active?'scale-110':'scale-90 opacity-60 hover:opacity-80 hover:scale-95'}`} style={isDialOpen?{animation:`dialItemIn 350ms cubic-bezier(0.34,1.56,0.64,1) ${idx * 50}ms both`}:{}}>
                        <div className={`h-14 w-14 rounded-full flex items-center justify-center shadow-lg transition-all duration-300 ${active?th.bg+' text-white ring-2 ring-white/20 '+th.glow:'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>{locked?<Lock size={18} className="text-slate-500 dark:text-slate-400"/>:icon}</div>
                        <span className={`text-[0.5625rem] font-black uppercase tracking-wider transition-colors ${active?th.dialText:'text-slate-500 dark:text-slate-400'}`}>{label}</span>
                        {pro&&!isProMode&&<Crown size={9} className="absolute -top-1 -right-1 text-amber-500"/>}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* Modal QR Code (Global) */}
          {qrItem && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center" onClick={()=>setQrItem(null)}>
              <div className="absolute inset-0 bg-slate-900/40 dark:bg-black/40  slide-up" style={{animationDuration: '200ms'}}/>
              <div className="bg-white dark:bg-slate-900 w-[280px] p-6 rounded-3xl shadow-2xl z-20 fade-in slide-up" onClick={e=>e.stopPropagation()}>
                <div className="bg-white p-3 rounded-2xl mb-4 shadow-sm border border-slate-100 dark:border-slate-800 mx-auto w-max [&>svg]:w-48 [&>svg]:h-48" dangerouslySetInnerHTML={{__html: generateQR(getDisplayValue(qrItem))}}></div>
                <h3 className="text-center font-bold text-slate-800 dark:text-slate-200 text-lg mb-1 truncate">{qrItem.title}</h3>
                <p className="text-center text-xs text-slate-400 mb-6 uppercase tracking-widest font-bold">Klip Pro QR Generator</p>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={()=>setQrItem(null)} className="py-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold rounded-xl text-sm active:scale-95">Tutup</button>
                  <button onClick={()=>{copy(getDisplayValue(qrItem),qrItem.title);setQrItem(null)}} className={`py-3 ${th.bg} text-white font-bold rounded-xl text-sm active:scale-95 flex items-center justify-center gap-1.5`}><Copy size={14}/> Salin Teks</button>
                </div>
              </div>
            </div>
          )}

          {toastMsg&&(
            <div className="absolute top-12 inset-x-0 flex justify-center z-[110] pointer-events-none">
              <div className="bg-slate-900/95 dark:bg-white/95 backdrop-blur-xl text-white dark:text-slate-900 px-5 py-2.5 rounded-2xl shadow-2xl flex items-center gap-2.5 slide-down border border-white/10 dark:border-slate-200 pointer-events-auto" style={{maxWidth:'85%'}}>
                <div className={`h-5 w-5 rounded-full flex items-center justify-center flex-shrink-0 ${th.bg}`}><Check size={11} className="text-white" strokeWidth={3}/></div>
                <span className="font-bold text-sm tracking-wide whitespace-nowrap">{toastMsg}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<KlipApp/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
